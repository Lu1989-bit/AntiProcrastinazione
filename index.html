<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIELD OS v6.0</title>
    <!-- PWA Manifest Inline -->
    <link rel="manifest" href="data:application/manifest+json,{'name':'ShieldOS','short_name':'Shield','start_url':'.','display':'standalone','background_color':'#020617','theme_color':'#3b82f6','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/1183/1183672.png','sizes':'512x512','type':'image/png'}]}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #020617; color: #94a3b8; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(51, 65, 85, 0.4); }
        .tab-active { color: #fff; border-bottom: 4px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .xp-bar { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .mic-active { animation: pulse-red 1.5s infinite; color: #ef4444 !important; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        /* Ottimizzazione Mobile Xiaomi */
        input, textarea { font-size: 16px !important; } /* Evita zoom automatico su iPhone/Android */
    </style>
</head>
<body class="min-h-screen pb-20 select-none">

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 p-4 rounded-2xl glass border-blue-500 text-blue-400 font-bold translate-y-[-150%] transition-transform duration-500 z-[100] text-xs shadow-2xl shadow-blue-500/20"></div>

    <header class="sticky top-0 z-50 p-4 lg:p-6 glass border-b border-slate-800">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-600 rounded-xl shadow-lg shadow-blue-900/40"><i class="ph-fill ph-shield-check text-white"></i></div>
                <div>
                    <h1 class="text-sm font-black text-white tracking-widest uppercase italic">Shield v6.0</h1>
                    <div class="text-[9px] text-slate-500 uppercase font-bold tracking-tighter">Gold Tier | Level <span id="lvl">1</span></div>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="requestPerms()" class="p-2 bg-slate-800 rounded-lg text-slate-400" title="Notifiche"><i class="ph ph-bell"></i></button>
                <button onclick="exportData()" class="p-2 bg-slate-800 rounded-lg text-slate-400" title="Backup"><i class="ph ph-floppy-disk"></i></button>
                <button onclick="runExodus()" class="px-4 py-2 bg-red-600/20 text-red-500 border border-red-500/30 rounded-lg font-bold text-[10px] tracking-widest">EXODUS</button>
            </div>
        </div>
        
        <!-- XP BAR -->
        <div class="max-w-6xl mx-auto mt-4 px-1">
            <div class="w-full bg-slate-900 h-1 rounded-full overflow-hidden">
                <div id="xpBar" class="xp-bar bg-blue-500 h-full w-0 shadow-[0_0_8px_#3b82f6]"></div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6 mt-4">
        
        <!-- LEFT: CONTROLS -->
        <div class="lg:col-span-4 space-y-4">
            <!-- ALARM -->
            <div class="glass rounded-3xl p-5 border-l-4 border-l-yellow-500 shadow-xl">
                <h3 class="text-[10px] font-black text-yellow-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <i class="ph-fill ph-lightning"></i> Focus Timer
                </h3>
                <div class="flex gap-2 mb-4">
                    <input type="number" id="alarmTime" placeholder="Minuti" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-center text-white outline-none focus:border-yellow-500 font-bold">
                    <button onclick="setAlarm()" class="bg-yellow-500 text-black px-6 rounded-xl font-black text-xs transition-transform active:scale-95">START</button>
                </div>
                <div id="timerHUD" class="hidden flex items-center justify-between bg-yellow-500/5 p-4 rounded-2xl border border-yellow-500/10">
                    <span id="countdown" class="text-2xl font-black text-white">00:00</span>
                    <button onclick="stopAlarm()" class="text-red-500 p-2 bg-red-500/10 rounded-full"><i class="ph ph-stop text-xl"></i></button>
                </div>
            </div>

            <!-- BRIDGE -->
            <div class="glass rounded-3xl p-5 border-l-4 border-l-orange-500 shadow-xl">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Ponte Logico</h3>
                    <button onclick="voice('logicBridge')" class="p-2 text-slate-400 active:text-orange-500"><i id="mic-logicBridge" class="ph ph-microphone text-xl"></i></button>
                </div>
                <textarea id="logicBridge" oninput="save()" class="w-full bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-xs text-orange-100 font-mono outline-none h-28 resize-none" placeholder="Cosa farai al rientro?"></textarea>
            </div>
        </div>

        <!-- RIGHT: WORKSPACE -->
        <div class="lg:col-span-8 flex flex-col h-[650px] glass rounded-[2.5rem] overflow-hidden shadow-2xl border-slate-800">
            <div class="flex bg-slate-950/80 p-2 border-b border-slate-800">
                <button onclick="tab('focus')" id="t-focus" class="flex-1 py-4 text-[10px] font-black uppercase tracking-tighter tab-active rounded-2xl">V1 Esecuzione</button>
                <button onclick="tab('vault')" id="t-vault" class="flex-1 py-4 text-[10px] font-black uppercase tracking-tighter text-slate-500 rounded-2xl">V2 Vault</button>
                <button onclick="tab('log')" id="t-log" class="flex-1 py-4 text-[10px] font-black uppercase tracking-tighter text-slate-500 rounded-2xl">Log Book</button>
            </div>

            <!-- FOCUS TAB -->
            <div id="c-focus" class="p-6 flex-1 flex flex-col overflow-hidden">
                <div class="flex gap-2 mb-6">
                    <div class="flex-1 relative">
                        <input type="text" id="taskIn" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none text-white focus:border-blue-500" placeholder="Prossimo micro-task...">
                        <button onclick="voice('taskIn')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500"><i id="mic-taskIn" class="ph ph-microphone text-xl"></i></button>
                    </div>
                    <button onclick="addTask()" class="bg-blue-600 text-white px-8 rounded-2xl font-black text-xs active:scale-95 transition-transform">ADD</button>
                </div>
                <div id="taskList" class="space-y-3 overflow-y-auto pr-2 custom-scroll"></div>
            </div>

            <!-- VAULT TAB -->
            <div id="c-vault" class="p-6 hidden flex-1 flex flex-col overflow-hidden">
                <div class="bg-cyan-950/20 border border-cyan-900/20 p-4 rounded-2xl mb-6 text-[10px] text-cyan-400 italic">
                    "Sposta qui ogni idea 'geniale' che non serve a lanciare il server oggi."
                </div>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="vaultIn" class="flex-1 bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none" placeholder="Idea futura...">
                    <button onclick="addIdea()" class="bg-cyan-600 px-6 rounded-2xl font-bold">FREEZE</button>
                </div>
                <div id="vaultList" class="space-y-2 overflow-y-auto"></div>
            </div>

            <!-- LOG TAB -->
            <div id="c-log" class="p-6 hidden flex-1 flex flex-col relative">
                <div class="absolute top-8 right-10 flex gap-2">
                    <button onclick="voice('logBook')" class="p-2 text-slate-500"><i id="mic-logBook" class="ph ph-microphone-fill text-2xl"></i></button>
                    <button onclick="copyLog()" class="p-2 text-slate-500"><i class="ph ph-copy text-2xl"></i></button>
                </div>
                <textarea id="logBook" oninput="save()" class="flex-1 bg-slate-950/30 border border-slate-800 rounded-[2rem] p-8 text-sm font-mono text-slate-300 outline-none leading-relaxed resize-none" placeholder="Ragionamenti logici complessi..."></textarea>
            </div>
        </div>
    </main>

    <script>
        let db = { tasks: [], vault: [], bridge: "", log: "", xp: 0, lvl: 1, alarm: null };
        let timerInt;

        // --- CORE ---
        function save() {
            db.bridge = document.getElementById('logicBridge').value;
            db.log = document.getElementById('logBook').value;
            localStorage.setItem('shield_v6_gold', JSON.stringify(db));
            render();
        }

        function load() {
            const s = localStorage.getItem('shield_v6_gold');
            if (s) {
                db = JSON.parse(s);
                document.getElementById('logicBridge').value = db.bridge || "";
                document.getElementById('logBook').value = db.log || "";
                if (db.alarm && db.alarm > Date.now()) startTimer(db.alarm);
            }
            render();
        }

        // --- ALARM & SENSORS ---
        function setAlarm() {
            const m = document.getElementById('alarmTime').value;
            if (!m) return;
            const end = Date.now() + (m * 60000);
            db.alarm = end;
            save();
            startTimer(end);
            toast("Focus Session Iniziata");
        }

        function startTimer(end) {
            document.getElementById('timerHUD').classList.remove('hidden');
            if (timerInt) clearInterval(timerInt);
            timerInt = setInterval(() => {
                const diff = end - Date.now();
                if (diff <= 0) {
                    trigger();
                    stopAlarm();
                } else {
                    const min = Math.floor(diff / 60000).toString().padStart(2, '0');
                    const sec = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                    document.getElementById('countdown').innerText = `${min}:${sec}`;
                }
            }, 1000);
        }

        function stopAlarm() {
            clearInterval(timerInt);
            db.alarm = null;
            document.getElementById('timerHUD').classList.add('hidden');
            save();
        }

        function trigger() {
            if ("vibrate" in navigator) navigator.vibrate([500, 200, 500, 200, 500]);
            new Audio("data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YV9vT18=").play().catch(()=>{});
            if (Notification.permission === "granted") {
                new Notification("SHIELD OS: Tempo Scaduto", { body: "Valuta il progresso e respira." });
            }
        }

        // --- ACTIONS ---
        function addTask() {
            const i = document.getElementById('taskIn');
            const val = i.value.trim();
            if (!val || db.tasks.filter(t => !t.done).length >= 3) return toast("FOCUS: Massimo 3 Task attivi");
            db.tasks.unshift({ id: Date.now(), text: val, done: false });
            i.value = ""; save();
        }

        function toggleTask(id) {
            const t = db.tasks.find(x => x.id === id);
            if (t && !t.done) {
                t.done = true;
                db.xp += 34;
                if (db.xp >= 100) { db.xp = 0; db.lvl++; toast("LEVEL UP! 👑"); }
                toast("+34 XP: Task Concluso");
            } else if (t) {
                t.done = false; db.xp = Math.max(0, db.xp - 34);
            }
            save();
        }

        function addIdea() {
            const i = document.getElementById('vaultIn');
            if (!i.value.trim()) return;
            db.vault.unshift({ id: Date.now(), text: i.value.trim() });
            i.value = ""; toast("IDEA CONGELATA V2"); save();
        }

        // --- UI ---
        function render() {
            const tl = document.getElementById('taskList');
            tl.innerHTML = db.tasks.map(t => `
                <div class="flex items-center justify-between p-5 rounded-2xl glass ${t.done ? 'opacity-30' : 'border-blue-500/20'} transition-all">
                    <div class="flex items-center gap-4 cursor-pointer flex-1" onclick="toggleTask(${t.id})">
                        <i class="ph-fill ${t.done ? 'ph-check-circle text-green-500' : 'ph-circle text-slate-600'} text-2xl"></i>
                        <span class="text-xs font-bold ${t.done ? 'line-through text-slate-500' : 'text-slate-100'}">${t.text}</span>
                    </div>
                    <button onclick="delT(${t.id})" class="text-slate-700 active:text-red-500"><i class="ph ph-trash text-xl"></i></button>
                </div>
            `).join('');

            const vl = document.getElementById('vaultList');
            vl.innerHTML = db.vault.map(v => `
                <div class="p-3 bg-slate-950/50 border border-cyan-900/20 rounded-xl text-[10px] flex justify-between italic">
                    <span class="text-cyan-600">${v.text}</span>
                    <button onclick="delV(${v.id})" class="text-slate-800">X</button>
                </div>
            `).join('');

            document.getElementById('xpBar').style.width = db.xp + "%";
            document.getElementById('lvl').innerText = db.lvl;
        }

        function delT(id) { db.tasks = db.tasks.filter(x => x.id !== id); save(); }
        function delV(id) { db.vault = db.vault.filter(x => x.id !== id); save(); }

        function tab(t) {
            ['focus', 'vault', 'log'].forEach(id => {
                document.getElementById('t-'+id).classList.remove('tab-active');
                document.getElementById('c-'+id).classList.add('hidden');
            });
            document.getElementById('t-'+t).classList.add('tab-active');
            document.getElementById('c-'+t).classList.remove('hidden');
        }

        function toast(m) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.classList.remove('translate-y-[-150%]');
            setTimeout(() => t.classList.add('translate-y-[-150%]'), 3000);
        }

        // --- VOICE ---
        const Rec = 'webkitSpeechRecognition' in window ? new webkitSpeechRecognition() : null;
        if (Rec) { Rec.lang = 'it-IT'; Rec.continuous = false; }
        function voice(id) {
            if (!Rec) return toast("Browser non supportato");
            const mic = document.getElementById('mic-'+id);
            mic.classList.add('mic-active'); Rec.start();
            Rec.onresult = (e) => {
                const txt = e.results[0][0].transcript;
                const el = document.getElementById(id);
                el.tagName === 'TEXTAREA' ? el.value += (el.value ? ' ' : '') + txt : el.value = txt;
                save();
            };
            Rec.onend = () => mic.classList.remove('mic-active');
        }

        function requestPerms() { Notification.requestPermission(); toast("Permessi Attivati"); }
        function copyLog() { navigator.clipboard.writeText(db.log); toast("Log Copiato"); }
        function exportData() {
            const b = new Blob([JSON.stringify(db)], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "shield_gold.json"; a.click();
        }
        function runExodus() {
            const md = `# SHIELD GOLD REPORT\nLvl: ${db.lvl}\n\n## BRIDGE\n${db.bridge}\n\n## LOG\n${db.log}`;
            const b = new Blob([md], {type:'text/markdown'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "exodus.md"; a.click();
        }

        window.onload = load;
    </script>
</body>
</html>
